services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    ports:
      - '${API_PORT:-4000}:4000'
    volumes:
      - api-data:/app/apps/api/prisma

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    ports:
      - '${WEB_PORT:-3000}:3000'
    depends_on:
      - api

volumes:
  api-data:
